<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h2>Login</h2>

    <input
    type="email"
    id="email"
    placeholder="E-mail"
    required
    >
    <small id="emailErro"></small>

    <input
        type="password"
        id="senha"
        placeholder="Senha"
        required
    >
    

    <button onclick="login()">
        Entrar
    </button>

    <p>
        Não possui conta?
        <a href="register.html">Cadastrar</a>
    </p>

</div>

<script src="app.js"></script>

</body>
</html>
