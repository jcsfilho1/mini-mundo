version: '3.8'

services:
  # Serviço do Banco de Dados
  db:
    image: postgres:15
    container_name: minimundo-db
    environment:
      POSTGRES_DB: minimundo
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Serviço do seu Back-end Java
  api:
    build: .
    container_name: minimundo-api
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DB_URL=jdbc:postgresql://db:5432/minimundo
      - DB_USER=admin
      - DB_PASS=admin
    depends_on:
      - db

volumes:
  pgdata: