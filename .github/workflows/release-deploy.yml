name: CI/CD Deploy - Main Tags

on:
  push:
    tags:
      - '*' # Dispara o workflow para qualquer tag criada

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Essencial para trazer o histórico de todas as branches

      - name: Validar Branch e Padrão da Tag
        run: |
          # 1. Verifica se a tag existe na branch MAIN (ajustado de master para main)
          if ! git branch -r --contains HEAD | grep -q "origin/main"; then
            echo "ERRO: Esta tag não foi criada a partir da branch 'main'. Cancelando pipeline."
            exit 1
          fi

          # 2. Captura o nome da tag atual
          TAG_NAME="${{ github.ref_name }}"
          
          # 3. Sua Regex validando o padrão desejado
          REGEX="^(v|V)?([0-9]+\.)?([0-9]+\.)?(\*|[0-9]+).?(hf[0-9]+|Hf[0-9]+|HF[0-9]+)?$"
          
          if [[ ! $TAG_NAME =~ $REGEX ]]; then
            echo "ERRO: A tag '$TAG_NAME' não segue o padrão exigido pela Regex. Cancelando pipeline."
            exit 1
          fi
          
          echo "Sucesso: Tag '$TAG_NAME' validada na branch main!"

      - name: Executar o Deploy / Passos de CI/CD
        run: |
          echo "Iniciando o deploy da versão ${{ github.ref_name }} a partir da branch main..."
          # Coloque aqui os comandos reais de deploy do seu projeto